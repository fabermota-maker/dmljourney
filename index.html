<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Controle Inteligente | Produtos Journey</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f1b62">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
:root{--deep:#2f1b62;--purple:#5f4a8b;--teal:#27c9b7;--yellow:#fff35c;--ink:#f8f7ff;--muted:#c8c0df;--line:rgba(255,255,255,.13);--shadow:0 28px 80px rgba(9,5,25,.45);--danger:#ff5a5a}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at 15% -10%,#6b55a2 0,#2f1b62 42%,#15102d 100%);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:22px}
.app{width:min(430px,100%);height:920px;background:linear-gradient(180deg,rgba(59,37,107,.95),rgba(21,16,45,.92));border-radius:40px;overflow:auto;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(30px);position:relative}
.app::-webkit-scrollbar{width:0}
.top{position:sticky;top:0;z-index:4;background:linear-gradient(135deg,rgba(24,14,54,.98),rgba(52,32,105,.94));padding:12px 18px 14px;border-bottom-left-radius:22px;border-bottom-right-radius:22px;border-bottom:1px solid var(--line)}
.brandbar{display:flex;align-items:center;gap:10px}
.brandicon{width:40px;height:40px;border-radius:12px;object-fit:cover;box-shadow:0 10px 25px rgba(0,0,0,.22)}
.brandbar strong{display:block;font-size:16px;letter-spacing:-.2px}
.brandbar span{display:block;color:var(--muted);font-size:11px;margin-top:2px}
.topline{display:flex;align-items:end;justify-content:space-between;gap:12px;margin-top:12px}
h1{font-size:27px;line-height:.95;margin:0;font-weight:900;letter-spacing:-1px}
.sub{margin-top:8px;color:var(--muted);font-size:12px;line-height:1.45}
.month-pill{white-space:nowrap;background:rgba(255,255,255,.10);border:1px solid var(--line);padding:9px 11px;border-radius:16px;color:var(--muted);font-size:11px;font-weight:800}
.month-select{appearance:none;-webkit-appearance:none;white-space:nowrap;background:rgba(255,255,255,.10);border:1px solid var(--line);padding:9px 28px 9px 12px;border-radius:16px;color:var(--ink);font-size:11px;font-weight:850;outline:none;cursor:pointer;background-image:linear-gradient(45deg,transparent 50%,var(--yellow) 50%),linear-gradient(135deg,var(--yellow) 50%,transparent 50%);background-position:calc(100% - 15px) 50%,calc(100% - 10px) 50%;background-size:5px 5px,5px 5px;background-repeat:no-repeat}.month-select option{background:#24164b;color:white}
.actions{display:flex;gap:10px;margin:14px 20px 0}
.top-btn{flex:1;border:0;border-radius:18px;padding:13px 10px;font-weight:850;color:#201241;background:linear-gradient(135deg,var(--yellow),#f8f5a1);box-shadow:0 14px 30px rgba(255,243,92,.18)}
.top-btn.secondary{background:rgba(255,255,255,.10);color:#fff;border:1px solid var(--line);box-shadow:none}
.report-panel{display:none;margin:14px 20px 0;padding:16px;border-radius:24px;background:rgba(255,255,255,.10);border:1px solid var(--line)}
.report-panel.open{display:block}
.report-panel h2{margin:0 0 8px;font-size:18px}
.report-list{font-size:12.5px;color:var(--muted);line-height:1.65;max-height:220px;overflow:auto}
.search{margin:16px 20px 0;background:rgba(255,255,255,.09);border:1px solid var(--line);border-radius:20px;padding:14px 18px;color:var(--muted);display:flex;gap:10px;backdrop-filter:blur(16px)}
.tabs{display:flex;gap:10px;padding:16px 20px 2px;position:sticky;top:108px;z-index:3;background:linear-gradient(180deg,rgba(30,21,58,.96),rgba(30,21,58,.72),transparent)}
.tab{border:0;border-radius:999px;padding:10px 14px;background:rgba(255,255,255,.10);color:#fff;font-weight:750;flex:1}
.tab.active{background:var(--teal);color:#102a2b;box-shadow:0 10px 25px rgba(39,201,183,.23)}
.content{padding:8px 20px 34px}
.section-title{margin:22px 2px 10px;color:var(--yellow);font-size:15px;letter-spacing:.2px}
.card{display:grid;grid-template-columns:74px 1fr;gap:14px;align-items:start;background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.07));margin:12px 0;padding:14px;border-radius:25px;box-shadow:0 16px 42px rgba(0,0,0,.18);border:1px solid var(--line);backdrop-filter:blur(20px)}
.card.low{border-color:rgba(255,90,90,.55);box-shadow:0 16px 42px rgba(255,90,90,.10)}
.card.is-hidden,.section-title.is-hidden{display:none}
.icon-wrap{display:flex;flex-direction:column;align-items:center}
.icon{width:66px;height:66px;border-radius:22px;background:linear-gradient(145deg,rgba(39,201,183,.25),rgba(255,243,92,.10));display:grid;place-items:center;font-size:29px;border:1px solid rgba(255,255,255,.14)}
.ctrls{display:flex;gap:8px;margin-top:9px}
.ctrls button{width:28px;height:28px;border:1px solid var(--line);border-radius:9px;color:white;font-size:18px;font-weight:900;cursor:pointer}
.minus{background:rgba(95,74,139,.7);color:#cdbdff!important}
.plus{background:rgba(39,201,183,.23);color:#42f7e5!important}
.name-row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.name{font-weight:850;font-size:16px;margin-bottom:6px}
.meta{font-size:12.5px;color:var(--muted);line-height:1.5}
.tag{white-space:nowrap;background:rgba(39,201,183,.20);color:#77fff0;border:1px solid rgba(39,201,183,.35);padding:7px 9px;border-radius:999px;font-size:11px;font-weight:850}
.tag.stocked{background:rgba(255,243,92,.14);color:var(--yellow);border-color:rgba(255,243,92,.25)}
.stock{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:11px 0 8px}
.box{background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:16px;padding:9px}
.box small{display:block;color:var(--muted);font-size:11px;margin-bottom:3px}
.box b{font-size:19px;color:#73ff83}
.box.used b{color:#a977ff}
.card.low .box.stock-now b{color:var(--danger)}
.bar{height:7px;border-radius:99px;background:rgba(255,255,255,.12);overflow:hidden;margin:9px 0 5px}
.fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--teal),var(--yellow))}
.card.low .fill{background:var(--danger)}
.alert{display:none;margin-top:7px;color:var(--danger);font-weight:850;font-size:12.5px}
.card.low .alert{display:block}
.report{margin-top:20px;padding:18px;border-radius:28px;background:linear-gradient(135deg,rgba(39,201,183,.22),rgba(255,243,92,.12));border:1px solid var(--line);box-shadow:0 18px 45px rgba(0,0,0,.15)}
.report h2{margin:0 0 10px;font-size:18px}
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mini{background:rgba(255,255,255,.10);padding:12px;border-radius:18px}
.mini b{font-size:20px}
.no-buy{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.no-buy span{font-size:12px;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.09);color:var(--muted);border:1px solid var(--line)}
.add{position:sticky;left:calc(100% - 84px);bottom:20px;width:62px;height:62px;border-radius:22px;border:0;background:var(--yellow);box-shadow:0 16px 38px rgba(255,243,92,.24);font-size:30px;color:#221445}
.modal{position:fixed;inset:0;background:rgba(10,6,24,.72);backdrop-filter:blur(16px);display:none;align-items:end;justify-content:center;z-index:20}
.modal.open{display:flex}
.sheet{width:min(430px,100%);background:linear-gradient(180deg,rgba(72,51,126,.98),rgba(25,18,51,.98));border:1px solid rgba(255,255,255,.16);border-radius:34px 34px 0 0;padding:18px 20px 24px;box-shadow:0 -26px 80px rgba(0,0,0,.38)}
.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sheet h2{margin:0;font-size:24px}
.close{border:0;background:rgba(255,255,255,.12);color:white;width:38px;height:38px;border-radius:14px;font-size:22px}
.field{margin:12px 0}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin:0 0 7px 3px}
.field input,.field select{width:100%;border:1px solid var(--line);outline:none;border-radius:18px;padding:14px 15px;background:rgba(255,255,255,.10);color:white;font-size:15px}
.field select option{background:#24164b;color:white}
.field input::placeholder{color:#aaa2c9}
.field.hidden{display:none}
.save{width:100%;border:0;border-radius:20px;background:var(--teal);padding:15px;font-weight:900;color:#102a2b;margin-top:10px}
@media(max-width:380px){body{padding:0}.app{border-radius:0;height:100vh}.card{grid-template-columns:66px 1fr}.tabs{top:108px}.month-pill{display:none}}
</style>
</head>

<div class="search">⌕ buscar produto, categoria ou status</div>
<nav class="tabs"><button class="tab active" data-filter="todos">Todos</button><button class="tab" data-filter="em uso">Em uso</button><button class="tab" data-filter="estoque">Estoque</button></nav>
<section class="content" id="list"></section>
<button class="add" id="addBtn">+</button>
</main>

<div class="modal" id="modal">
  <div class="sheet">
    <div class="sheet-head"><h2>Adicionar produto</h2><button class="close" id="closeModal">×</button></div>
    <div class="field"><label>Nome do produto</label><input id="productName" placeholder="Ex: Desinfetante 5L"></div>
    <div class="field"><label>Quantidade em estoque</label><input id="productQty" type="number" min="0" placeholder="Ex: 4"></div>
    <div class="field"><label>Estoque mínimo</label><input id="productMin" type="number" min="0" placeholder="Ex: 2"></div>
    <div class="field"><label>Unidade</label><select id="productUnit"><option>un.</option><option>pct.</option><option>cx.</option><option>kg</option><option>fardos</option><option>frascos</option></select></div>
    <div class="field"><label>Categoria</label><select id="productCat"><option>DML</option><option>Secretaria / Cozinha</option><option>Sala de Reunião</option><option value="nova">+ Adicionar nova categoria</option></select></div>
    <div class="field hidden" id="newCatField"><label>Nova categoria</label><input id="newCat" placeholder="Ex: Banheiros, Manutenção..."></div>
    <button class="save" id="saveProduct">Salvar produto</button>
  </div>
</div>

<script>
const baseProducts = [{"cat": "DML", "name": "Cloro Gel 1L", "icon": "🧴", "stock": 8, "used": 2, "unit": "un.", "min": 2}, {"cat": "DML", "name": "Bom Ar", "icon": "🌬️", "stock": 1, "used": 0, "unit": "un.", "min": 1}, {"cat": "DML", "name": "Koala", "icon": "✨", "stock": 2, "used": 1, "unit": "un.", "min": 2}, {"cat": "DML", "name": "Bom Ar Perfume para Banheiro", "icon": "🚻", "stock": 2, "used": 1, "unit": "frascos", "min": 2}, {"cat": "DML", "name": "Sabão em Pó", "icon": "🫧", "stock": 1, "used": 0, "unit": "kg", "min": 2}, {"cat": "DML", "name": "Papel Toalha", "icon": "🧻", "stock": 4, "used": 2, "unit": "fardos", "min": 4}, {"cat": "DML", "name": "Saco de Lixo 60L", "icon": "🗑️", "stock": 1, "used": 0, "unit": "pct.", "min": 1}, {"cat": "DML", "name": "Saco de Lixo 20L", "icon": "🛍️", "stock": 2, "used": 1, "unit": "pct.", "min": 2}, {"cat": "DML", "name": "Luva GG", "icon": "🧤", "stock": 1, "used": 0, "unit": "cx.", "min": 1}, {"cat": "DML", "name": "Luva M", "icon": "🧤", "stock": 1, "used": 0, "unit": "cx.", "min": 1}, {"cat": "DML", "name": "Sapólio", "icon": "🧼", "stock": 1, "used": 0, "unit": "un.", "min": 1}, {"cat": "DML", "name": "Difusores", "icon": "🌿", "stock": 4, "used": 1, "unit": "un.", "min": 2}, {"cat": "DML", "name": "Grampo de Roupa", "icon": "📎", "stock": 1, "used": 0, "unit": "pct.", "min": 1}, {"cat": "DML", "name": "Borrifadores", "icon": "💦", "stock": 3, "used": 1, "unit": "un.", "min": 1}, {"cat": "DML", "name": "Formikel Mata-Formigas", "icon": "🐜", "stock": 1, "used": 0, "unit": "un.", "min": 1}, {"cat": "DML", "name": "Copos Descartáveis", "icon": "🥤", "stock": 1, "used": 0, "unit": "cx.", "min": 1}, {"cat": "DML", "name": "Álcool Gel", "icon": "🧴", "stock": 1, "used": 0, "unit": "un.", "min": 1}, {"cat": "Secretaria / Cozinha", "name": "Chá de Erva-Cidreira", "icon": "🍵", "stock": 10, "used": 3, "unit": "cx.", "min": 3}, {"cat": "Secretaria / Cozinha", "name": "Chá de Camomila", "icon": "🍵", "stock": 10, "used": 2, "unit": "cx.", "min": 3}, {"cat": "Secretaria / Cozinha", "name": "Açúcar", "icon": "🍬", "stock": 5, "used": 1, "unit": "kg", "min": 2}, {"cat": "Secretaria / Cozinha", "name": "Filtro de Café", "icon": "☕", "stock": 1, "used": 0, "unit": "cx.", "min": 1}, {"cat": "Sala de Reunião", "name": "Balas", "icon": "🍬", "stock": 2, "used": 1, "unit": "pct.", "min": 2}, {"cat": "Sala de Reunião", "name": "Bolachas", "icon": "🍪", "stock": 1, "used": 0, "unit": "pct.", "min": 1}];
const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const currentDate = new Date();
let selectedMonth = currentDate.getMonth();
let selectedYear = currentDate.getFullYear();
let products = [];

const list = document.getElementById('list');
const modal=document.getElementById('modal');
const addBtn=document.getElementById('addBtn');
const scrollAdd=document.getElementById('scrollAdd');
const closeModal=document.getElementById('closeModal');
const productCat=document.getElementById('productCat');
const newCatField=document.getElementById('newCatField');
const monthSelect=document.getElementById('monthSelect');
const monthSubtitle=document.getElementById('monthSubtitle');
const autoReportTitle=document.getElementById('autoReportTitle');

function monthLabel(){return `${monthNames[selectedMonth]}/${selectedYear}`;}
function monthKey(){return `journey-products-${selectedYear}-${String(selectedMonth+1).padStart(2,'0')}`;}
function cloneProducts(list){return JSON.parse(JSON.stringify(list));}
function sortedProducts(){
  return products.map((p,i)=>({...p,index:i})).sort((a,b)=>
    a.cat.localeCompare(b.cat,'pt-BR') || a.name.localeCompare(b.name,'pt-BR',{sensitivity:'base'})
  );
}
function saveCurrentMonth(){localStorage.setItem(monthKey(), JSON.stringify(products));}
function loadMonth(){
  const saved=localStorage.getItem(monthKey());
  products = saved ? JSON.parse(saved) : cloneProducts(baseProducts).map(p=>({...p, used:0}));
  updateMonthLabels();
  syncCategoryOptions();
  render();
}
function updateMonthLabels(){
  monthSelect.value = String(selectedMonth);
  monthSubtitle.textContent = `${monthLabel()} • estoque, uso e saldo`;
  autoReportTitle.textContent = `Lista automática • ${monthLabel()}`;
}
function syncCategoryOptions(){[...new Set(products.map(p=>p.cat))].forEach(ensureCategoryOption);}

function openModal(){modal.classList.add('open');setTimeout(()=>document.getElementById('productName').focus(),120)}
addBtn.onclick=openModal; scrollAdd.onclick=openModal; closeModal.onclick=()=>modal.classList.remove('open');
modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open')});
productCat.addEventListener('change',()=>newCatField.classList.toggle('hidden',productCat.value!=='nova'));
monthSelect.addEventListener('change',()=>{selectedMonth=Number(monthSelect.value);document.getElementById('autoReport').classList.remove('open');loadMonth();});

function escHTML(v){return String(v).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function iconFor(name){name=name.toLowerCase(); if(name.includes('papel'))return '🧻'; if(name.includes('lixo'))return '🗑️'; if(name.includes('álcool')||name.includes('cloro'))return '🧴'; if(name.includes('luva'))return '🧤'; if(name.includes('chá'))return '🍵'; if(name.includes('café'))return '☕'; if(name.includes('bala')||name.includes('açúcar'))return '🍬'; if(name.includes('bolacha'))return '🍪'; return '✨'}

function render(){
  const active=document.querySelector('.tab.active').dataset.filter;
  const ordered = sortedProducts();
  const cats=[...new Set(ordered.map(p=>p.cat))];
  let html='';
  cats.forEach(cat=>{
    const items=ordered.filter(p=>p.cat===cat).filter(p=>active==='todos'||(active==='em uso'&&p.used>0)||(active==='estoque'&&p.stock>0));
    if(!items.length) return;
    html += `<h3 class="section-title">${escHTML(cat)}</h3>`;
    items.forEach(p=>{
      const total = Math.max(p.stock + p.used, 1);
      const percent = Math.round((p.stock/total)*100);
      const low = p.stock <= p.min;
      const tagClass = p.used>0 ? '' : 'stocked';
      const tagText = p.used>0 ? 'Em uso' : 'Em estoque';
      html += `<article class="card ${low?'low':''}" data-index="${p.index}">
        <div class="icon-wrap">
          <div class="icon">${p.icon || iconFor(p.name)}</div>
          <div class="ctrls">
            <button class="minus" onclick="useProduct(${p.index})">−</button>
            <button class="plus" onclick="addStock(${p.index})">+</button>
          </div>
        </div>
        <div>
          <div class="name-row">
            <div><div class="name">${escHTML(p.name)}</div><div class="meta">Entrada: ${monthLabel()}<br>Categoria: ${escHTML(p.cat)}<br>Estoque mínimo: ${p.min} ${escHTML(p.unit)}</div></div>
            <span class="tag ${tagClass}">${tagText}</span>
          </div>
          <div class="stock">
            <div class="box stock-now"><small>Em estoque</small><b>${p.stock}</b> ${escHTML(p.unit)}</div>
            <div class="box used"><small>Utilizados</small><b>${p.used}</b> ${escHTML(p.unit)}</div>
          </div>
          <div class="bar"><div class="fill" style="width:${percent}%"></div></div>
          <div class="meta">Saldo visual: ${p.stock} ${escHTML(p.unit)}</div>
          <div class="alert">⚠ Estoque baixo! Reposição necessária.</div>
        </div>
      </article>`;
    });
  });
  const total=products.length, bought=products.reduce((s,p)=>s+p.stock+p.used,0), used=products.reduce((s,p)=>s+p.used,0);
  if(active==='todos') html += `<aside class="report"><h2>Relatório mensal salvo</h2><div class="report-grid"><div class="mini"><b>${total}</b><br><small>produtos</small></div><div class="mini"><b>${bought}</b><br><small>total mês</small></div><div class="mini"><b>${used}</b><br><small>utilizados</small></div></div><h2 style="margin-top:18px">Com estoque suficiente</h2><div class="no-buy"><span>Desinfetante 5L</span><span>Álcool 70</span><span>Esponja de Louça</span><span>Detergente 5L</span><span>Sabonete Líquido Morango 5L</span><span>Vassouras</span><span>Papel Higiênico (Alunos)</span><span>Papel Higiênico (ADM)</span><span>Saco de Lixo 120L</span><span>Panos de Chão Xadrez</span></div></aside>`;
  list.innerHTML=html;
}

function useProduct(i){ if(products[i].stock>0){products[i].stock--; products[i].used++; saveCurrentMonth(); render();} }
function addStock(i){ products[i].stock++; saveCurrentMonth(); render(); }

document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');render();}));

function ensureCategoryOption(cat){if(![...productCat.options].some(o=>o.value===cat||o.textContent===cat)){const opt=new Option(cat,cat);productCat.insertBefore(opt,productCat.querySelector('option[value="nova"]'));}}

document.getElementById('saveProduct').onclick=()=>{
  const name=document.getElementById('productName').value.trim();
  const qty=parseInt(document.getElementById('productQty').value||'0');
  const min=parseInt(document.getElementById('productMin').value||'1');
  const unit=document.getElementById('productUnit').value;
  let cat=productCat.value==='nova'?document.getElementById('newCat').value.trim():productCat.value;
  if(!name||qty<0||!cat)return;
  ensureCategoryOption(cat);
  products.push({cat,name,icon:iconFor(name),stock:qty,used:0,unit,min});
  products.sort((a,b)=>a.cat.localeCompare(b.cat,'pt-BR') || a.name.localeCompare(b.name,'pt-BR',{sensitivity:'base'}));
  saveCurrentMonth();
  modal.classList.remove('open');
  document.getElementById('productName').value=''; document.getElementById('productQty').value=''; document.getElementById('productMin').value=''; document.getElementById('newCat').value='';
  newCatField.classList.add('hidden');
  render();
};

function pdfEscape(s){return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[()\\]/g,'\\$&')}
function makePDF(lines){const pages=[];for(let i=0;i<lines.length;i+=34)pages.push(lines.slice(i,i+34));let objects=['<< /Type /Catalog /Pages 2 0 R >>'];let kids=[];pages.forEach((pg,idx)=>{const contentNum=4+idx*2;const pageNum=3+idx*2;kids.push(`${pageNum} 0 R`);let stream='BT /F1 11 Tf 50 790 Td ';pg.forEach((line,j)=>{stream+=`(${pdfEscape(line)}) Tj`; if(j<pg.length-1)stream+=' T* ';});stream+=' ET';objects[pageNum-1]=`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 << /Type /Font /Subtype /Type1 /BaseFont /Helvetica >> >> >> /Contents ${contentNum} 0 R >>`;objects[contentNum-1]=`<< /Length ${stream.length} >>
stream
${stream}
endstream`;});objects[1]=`<< /Type /Pages /Kids [${kids.join(' ')}] /Count ${pages.length} >>`;let pdf='%PDF-1.4
';let offs=[0];objects.forEach((o,i)=>{offs.push(pdf.length);pdf+=`${i+1} 0 obj
${o}
endobj
`;});let xref=pdf.length;pdf+=`xref
0 ${objects.length+1}
0000000000 65535 f 
`;offs.slice(1).forEach(off=>pdf+=String(off).padStart(10,'0')+' 00000 n 
');pdf+=`trailer << /Size ${objects.length+1} /Root 1 0 R >>
startxref
${xref}
%%EOF`;return new Blob([pdf],{type:'application/pdf'});}

document.getElementById('generateReport').onclick=()=>{
  const ordered=sortedProducts();
  let total=0,used=0;products.forEach(p=>{total+=p.stock+p.used;used+=p.used});
  const label=monthLabel();
  const lines=[`LISTA DO MES - ${label.toUpperCase()}`,`Colegio Journey - Controle de produtos`,`Gerado automaticamente em ${new Date().toLocaleDateString('pt-BR')}`,'',`Resumo: ${products.length} produtos | Total do mes: ${total} | Utilizados: ${used}`,''];
  let last='', counter=0;
  ordered.forEach(p=>{
    if(p.cat!==last){
      lines.push('',p.cat.toUpperCase());
      last=p.cat;
      counter=0;
    }
    counter++;
    const status=p.stock<=p.min?'ESTOQUE BAIXO - repor':'OK';
    lines.push(`${counter}. ${p.name}`);
    lines.push(`   Estoque atual: ${p.stock} ${p.unit}`);
    lines.push(`   Utilizados no mes: ${p.used} ${p.unit}`);
    lines.push(`   Estoque minimo: ${p.min} ${p.unit}`);
    lines.push(`   Status: ${status}`);
  });
  const fileMonth=monthNames[selectedMonth].toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  const blob=makePDF(lines);const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`lista-do-mes-${fileMonth}-${selectedYear}.pdf`;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
  document.getElementById('reportList').innerHTML=`PDF de <b>${label}</b> gerado com <b>${products.length}</b> produtos em ordem alfabética dentro de cada categoria.`;
  document.getElementById('autoReport').classList.add('open');
};

monthSelect.value = String(selectedMonth);
loadMonth();
</script>
</body>
</html>
